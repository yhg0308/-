<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦟 灭蚊大战 - Mosquito Slayer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ==================== LOADING SCREEN ==================== -->
<div id="loading-screen" class="screen">
  <div class="loading-content">
    <div class="loading-logo">🦟</div>
    <h2>灭蚊大战</h2>
    <div class="loading-bar-container">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
    <p id="loading-text">正在加载素材...</p>
  </div>
</div>

<!-- ==================== MAIN MENU SCREEN ==================== -->
<div id="menu-screen" class="screen hidden">
  <div class="menu-bg-mosquitoes" id="menu-mosquitoes"></div>
  <div class="menu-content">
    <div class="menu-logo-container">
      <div class="menu-logo-pulse">🦟</div>
      <h1 class="menu-title">灭蚊大战</h1>
      <p class="menu-subtitle">Mosquito Slayer</p>
    </div>
    <div class="menu-buttons">
      <button class="btn btn-primary btn-glow" id="btn-start">
        <span class="btn-icon">⚔️</span> 开始游戏
      </button>
      <button class="btn btn-secondary" id="btn-leaderboard">
        <span class="btn-icon">🏆</span> 查看排行榜
      </button>
    </div>
    <div class="menu-footer">
      <p>🖱️ 鼠标操作 | 🔢 数字键1-4切换道具 | ESC 暂停</p>
    </div>
  </div>
</div>

<!-- ==================== GAME SCREEN ==================== -->
<div id="game-screen" class="screen hidden">
  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Top-left HUD: Stamina + Kills -->
  <div id="hud-top-left">
    <div id="stamina-bar-container">
      <div id="stamina-bar-fill"></div>
      <span id="stamina-text">100/100</span>
    </div>
    <div id="kill-count-display">
      <span class="trophy-icon">🏆</span>
      <span id="kill-count-text">0</span>
    </div>
  </div>

  <!-- Top-right HUD: Coil count -->
  <div id="hud-top-right">
    <div id="coil-count-display">
      <span>🪴</span>
      <span id="coil-placed-text">0</span>
      <span>/</span>
      <span id="coil-max-text">1</span>
    </div>
  </div>

  <!-- Pause/Exit button -->
  <button id="btn-pause" title="暂停/退出 (ESC)">✕</button>

  <!-- Bottom: Tool bar -->
  <div id="tool-bar">
    <div class="tool-slot" data-tool="0" id="tool-slot-0">
      <div class="tool-key">1</div>
      <div class="tool-icon">🖐️</div>
      <div class="tool-name">手</div>
      <div class="tool-cost">-5</div>
      <div class="tool-selected-indicator"></div>
    </div>
    <div class="tool-slot locked" data-tool="1" id="tool-slot-1">
      <div class="tool-key">2</div>
      <div class="tool-icon">🪰</div>
      <div class="tool-name">苍蝇拍</div>
      <div class="tool-cost">-2</div>
      <div class="tool-lock">🔒</div>
      <div class="tool-selected-indicator"></div>
    </div>
    <div class="tool-slot locked" data-tool="2" id="tool-slot-2">
      <div class="tool-key">3</div>
      <div class="tool-icon">⚡</div>
      <div class="tool-name">电蚊拍</div>
      <div class="tool-cost">-1</div>
      <div class="tool-lock">🔒</div>
      <div class="tool-selected-indicator"></div>
    </div>
    <div class="tool-slot locked" data-tool="3" id="tool-slot-3">
      <div class="tool-key">4</div>
      <div class="tool-icon">🪴</div>
      <div class="tool-name">蚊香</div>
      <div class="tool-cost">-10</div>
      <div class="tool-lock">🔒</div>
      <div class="tool-selected-indicator"></div>
    </div>
  </div>

  <!-- Newbie hint -->
  <div id="newbie-hint" class="hidden">
    <div class="hint-bubble">
      💡 再击杀 <span id="hint-kills-remaining">1</span> 只，解锁强力苍蝇拍！
    </div>
  </div>

  <!-- Electric swatter drag cursor (follows mouse during drag) -->
  <div id="electric-cursor" class="hidden">
    <img src="assets/电蚊拍（常态）.png" alt="电蚊拍">
    <div class="electric-arc"></div>
  </div>

  <!-- Coil placement mode indicator -->
  <div id="coil-placement-indicator" class="hidden">
    <div class="placement-circle"></div>
    <span>点击场景放置蚊香</span>
  </div>
</div>

<!-- ==================== LEADERBOARD SCREEN ==================== -->
<div id="leaderboard-screen" class="screen hidden">
  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <button class="btn-back" id="btn-back-from-leaderboard">← 返回</button>
      <h2>🏆 排行榜</h2>
    </div>
    <div class="leaderboard-search">
      <input type="text" id="search-input" placeholder="🔍 搜索玩家昵称...">
      <span id="search-no-result" class="hidden">未找到该玩家</span>
    </div>
    <div class="leaderboard-table-wrap">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>排名</th>
            <th>玩家昵称</th>
            <th>击杀数</th>
            <th>达成时间</th>
          </tr>
        </thead>
        <tbody id="leaderboard-tbody">
        </tbody>
      </table>
      <div id="leaderboard-empty" class="hidden">
        <p>暂无记录</p>
        <p class="sub">开始游戏并创造你的第一个记录吧！</p>
      </div>
    </div>
  </div>
</div>

<!-- ==================== PAUSE / END MODAL OVERLAY ==================== -->
<div id="modal-overlay" class="hidden">
  <div class="modal-bg-blur"></div>
  <div class="modal-box" id="modal-box">
    <!-- Content filled dynamically by JS -->
  </div>
</div>

<!-- ==================== NAME DUPLICATE MODAL ==================== -->
<div id="duplicate-modal" class="hidden">
  <div class="modal-bg-blur"></div>
  <div class="modal-box">
    <h3>⚠️ 昵称已存在</h3>
    <p id="duplicate-message"></p>
    <div class="duplicate-options">
      <button class="btn btn-primary" id="dup-overwrite" disabled>覆盖旧记录</button>
      <button class="btn btn-secondary" id="dup-rename">修改昵称</button>
      <button class="btn btn-ghost" id="dup-cancel">取消</button>
    </div>
  </div>
</div>

<script src="js/audio.js"></script>
<script src="js/mosquito.js"></script>
<script src="js/player.js"></script>
<script src="js/tools.js"></script>
<script src="js/particles.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/main.js"></script>
</body>
</html>
